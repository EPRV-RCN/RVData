name: Publish to PyPI on Release

on:
  release:
    types: [published]
  workflow_dispatch: {}

permissions:
  contents: read
  id-token: write  # Required for Trusted Publishing (OIDC)

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # required for setuptools_scm to see tags

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: Upgrade pip and install build tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install build

      - name: Build sdist and wheel
        run: python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        # Using Trusted Publishing (OIDC) - no password needed
        # Trusted Publisher is already configured for 'rv-data-standard' on PyPI
        # 
        # If you need to use API token instead, uncomment the lines below:
        # with:
        #   password: ${{ secrets.PYPI_API_TOKEN }}
        #   verbose: true


