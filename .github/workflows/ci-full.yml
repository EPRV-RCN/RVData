name: Full CI - All Tests and Benchmarks

on:
  push:
    branches:
      - main
      - develop
  pull_request:
  workflow_dispatch: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  checks: write

env:
  PIP_CACHE_DIR: ~/.cache/pip

jobs:
  codestyle:
    name: Code Style Check
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install tox

      - name: Run flake8 checks
        run: tox -e codestyle

  regression:
    name: Regression Tests - Python 3.${{ matrix.python-ver }} (${{ matrix.tox-env }}, ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: codestyle
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-ver: ['12', '13', '14']
        tox-env: [test, test-olddeps, test-predeps]
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python 3.${{ matrix.python-ver }}
        uses: actions/setup-python@v5
        with:
          python-version: '3.${{ matrix.python-ver }}'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install tox

      - name: Run tests
        run: tox -e py3${{ matrix.python-ver }}-${{ matrix.tox-env }}

  coverage:
    name: Coverage Report
    runs-on: ubuntu-latest
    needs: codestyle
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install tox

      - name: Run tests with coverage
        run: tox -e py313-coverage

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: coverage.xml
          fail_ci_if_error: false

  benchmark:
    name: Benchmark Tests - Python 3.${{ matrix.python-ver }}
    runs-on: ${{ matrix.os }}
    needs: regression
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        python-ver: ['13']
        tox-env: [benchmark]
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python 3.${{ matrix.python-ver }}
        uses: actions/setup-python@v5
        with:
          python-version: '3.${{ matrix.python-ver }}'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install tox

      - name: Run benchmark tests
        run: tox -e py3${{ matrix.python-ver }}-${{ matrix.tox-env }} -- --benchmark-json ${{ runner.temp }}/output.json

      - name: Upload benchmark results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results-py${{ matrix.python-ver }}-${{ matrix.tox-env }}
          path: ${{ runner.temp }}/output.json
          retention-days: 30
